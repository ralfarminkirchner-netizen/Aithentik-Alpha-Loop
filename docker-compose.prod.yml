version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./infra/qdrant_storage:/qdrant/storage
    healthcheck:
      test: [ "CMD", "sh", "-c", "grep 18BD /proc/net/tcp" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./infra/ollama_data:/root/.ollama
    healthcheck:
      test: [ "CMD", "sh", "-c", "grep 2CAA /proc/net/tcp*" ]
      interval: 10s
      timeout: 5s
      retries: 5

  harbor:
    build:
      context: ./backend
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_HOST=http://ollama:11434
      - AITHENTIK_API_KEY=${AITHENTIK_API_KEY}
    volumes:
      - ./data:/app/data
    restart: always

  cockpit:
    build:
      context: ./backend
    ports:
      - "8501:8501"
    depends_on:
      harbor:
        condition: service_healthy
    environment:
      - AITHENTIK_API_KEY=${AITHENTIK_API_KEY}
      - HARBOR_URL=http://harbor:8000
    command: [ "streamlit", "run", "cockpit.py", "--server.port", "8501", "--server.headless", "true" ]
    restart: always
