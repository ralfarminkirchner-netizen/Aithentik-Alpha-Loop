version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./infra/qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./infra/ollama_data:/root/.ollama

  alpha-daemon:
    build:
      context: ./backend
    depends_on:
      - qdrant
      - ollama
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_HOST=http://ollama:11434
    restart: always

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - alpha-daemon
    restart: always
